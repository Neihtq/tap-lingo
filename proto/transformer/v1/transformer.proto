syntax = "proto3";

option go_package = "github.com/neihtq/tap-lingo/gen/go/transformer/v1";

service TransformerService {
  rpc Transform(TransformRequest) returns (TransformResponse);
}

package transformer.v1;

message TransformRequest {
  string url = 1;
}

message TransformResponse {
  string title = 1;
  string byline = 2;
  string imageUrl = 3;
  string htmlContent = 4;
  string plaintText = 5;
  repeated string nGrams = 6;
}
